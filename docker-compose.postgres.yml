services:
  postgres:
    image: postgres:16-alpine
    container_name: listingify-postgres
    environment:
      POSTGRES_DB: listingify
      POSTGRES_USER: listingify
      POSTGRES_PASSWORD: listingify
    ports:
      - "5432:5432"
    volumes:
      - listingify-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listingify -d listingify"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  listingify-postgres-data:
